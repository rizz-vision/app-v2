name: HuggingFace Space keep-alive

on:
  workflow_run:
    workflows: ["Deploy backend to HuggingFace Spaces"]
    types: [completed]
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes — keeps HF Space from sleeping
  workflow_dispatch:        # manual trigger from Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Space to boot (deploy trigger only)
        if: github.event_name == 'workflow_run'
        run: sleep 120   # give HF ~2 min to rebuild after a deploy

      - name: Ping /health
        run: |
          URL="https://rizzvision69-app-v2-space.hf.space/health"
          STATUS=$(curl -s -o /tmp/body -w "%{http_code}" --max-time 30 "$URL")
          BODY=$(cat /tmp/body)
          echo "HTTP $STATUS — $BODY"
          if [ "$STATUS" = "200" ]; then
            echo "✓ Space is alive"
          else
            echo "⚠️ Space returned HTTP $STATUS — may be cold-starting, will retry next cycle"
          fi

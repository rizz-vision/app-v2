<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Rizzvision · Clarity · Accessibility-first</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Inter:wght@400;500;600;700;800;900&family=Inter+Tight:wght@400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&family=Archivo+Black&display=swap" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #e8e6df;
      color: #f0f0f0;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    #stage {
      transform-origin: center center;
      transition: transform 200ms ease;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="themes.js"></script>
  <script src="mock-data.js"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel" src="ui-kit.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel" src="tweaks-app.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useEffect, useState } = React;
    const VARIANT = 'clarity';
    const NATIVE_MODE = { studio: 'dark', clarity: 'light', voltage: 'light' };

    function useGlobalTweaks() {
      const get = () => window.__TWEAKS || { mode: 'auto', density: 'comfortable', reducedMotion: false };
      const [v, setV] = useState(get);
      useEffect(() => {
        const on = () => setV(get());
        window.addEventListener('rizz-tweaks-changed', on);
        return () => window.removeEventListener('rizz-tweaks-changed', on);
      }, []);
      return v;
    }

    function useFit(designW = 420, designH = 870) {
      const [s, setS] = useState(1);
      useEffect(() => {
        const fit = () => {
          const sw = window.innerWidth, sh = window.innerHeight;
          setS(Math.min(sw / designW, sh / designH, 1));
        };
        fit();
        window.addEventListener('resize', fit);
        return () => window.removeEventListener('resize', fit);
      }, []);
      return s;
    }

    function Root() {
      const tw = useGlobalTweaks();
      const mode = tw.mode === 'auto' ? NATIVE_MODE[VARIANT] : tw.mode;
      const theme = window.THEMES[VARIANT][mode] || window.THEMES[VARIANT].dark;
      const dark = window.isDark ? window.isDark(theme.bg) : false;
      const scale = useFit();

      // sync body bg to theme
      useEffect(() => {
        document.body.style.background = mode === 'light' ? '#e8e6df' : '#1a1820';
      }, [mode]);

      return (
        <>
          <div id="stage" style={{ transform: `scale(${scale})` }}>
            <IOSDevice width={402} height={870} dark={dark} keyboard={false}>
              <RizzApp theme={theme} density={tw.density} reducedMotion={tw.reducedMotion} />
            </IOSDevice>
          </div>
          <TweaksApp />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
